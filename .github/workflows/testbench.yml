name: Testbench

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  testbench:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '12'
            testbench: '^10.11'
          - php: '8.2'
            laravel: '13'
            testbench: '^11.0'
          - php: '8.5'
            laravel: '12'
            testbench: '^10.11'
          - php: '8.5'
            laravel: '13'
            testbench: '^11.0'

    name: PHP ${{ matrix.php }}, Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, curl, json
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # No composer.lock in repo: partial `composer update pkg` fails. Resolve framework first (creates lock), then Testbench.
      - name: Install dependencies
        run: |
          composer require "laravel/framework:^${{ matrix.laravel }}.0" --no-interaction --no-progress -W
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-progress -W

      - name: Run Testbench workbench build
        run: composer run build

      - name: Run package tests (Orchestra Testbench / PHPUnit)
        run: ./vendor/bin/phpunit -c phpunit.xml.dist
